name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  UNITY_VERSION: 6000.4.0f1
  UNITY_IMAGE_VERSION: 3
  REBELLION2_MEDIA_REVISION: 8dc2d8fbe2c23399a16ede6bf95b41b6fee54fa4

jobs:
  build:
    name: Build (${{ matrix.targetPlatform }})
    runs-on: ubuntu-latest
    needs: lint
    environment: production
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        targetPlatform: ${{ fromJSON(github.event_name == 'pull_request' && '["StandaloneLinux64"]' || '["StandaloneWindows64", "StandaloneLinux64", "StandaloneOSX"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout media
        uses: actions/checkout@v4
        with:
          repository: davidadas/rebellion2-media
          ref: ${{ env.REBELLION2_MEDIA_REVISION }}
          ssh-key: ${{ secrets.REBELLION2_MEDIA_SSH_KEY }}
          persist-credentials: false
          lfs: true
          sparse-checkout: |
            Art
            Audio
            Videos
          path: .ci/rebellion2-media

      - name: Install media
        run: |
          rsync -a --ignore-existing --exclude=.DS_Store .ci/rebellion2-media/Art/ Assets/Resources/Art/
          rsync -a --ignore-existing --exclude=.DS_Store .ci/rebellion2-media/Audio/ Assets/Resources/Audio/
          rsync -a --ignore-existing --exclude=.DS_Store .ci/rebellion2-media/Videos/ Assets/Resources/Videos/
          rm -rf .ci

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Pre-pull Unity Docker image
        run: |
          case "${{ matrix.targetPlatform }}" in
            StandaloneLinux64)   MODULE="linux-il2cpp" ;;
            StandaloneWindows64) MODULE="windows-mono" ;;
            StandaloneOSX)       MODULE="mac-mono" ;;
          esac
          IMAGE="unityci/editor:ubuntu-${{ env.UNITY_VERSION }}-${MODULE}-${{ env.UNITY_IMAGE_VERSION }}"
          for attempt in 1 2 3; do
            docker pull "$IMAGE" && exit 0
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          exit 1

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: ${{ matrix.targetPlatform }}

      - name: Reset package files
        run: |
          git checkout -- Packages/manifest.json Packages/packages-lock.json 2>/dev/null || true
          sudo rm -rf artifacts || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Install tools
        run: |
          dotnet tool restore

      - name: Format check
        run: dotnet csharpier check Assets/

      - name: Extract Unity managed assemblies
        run: |
          IMAGE="unityci/editor:ubuntu-${{ env.UNITY_VERSION }}-linux-il2cpp-${{ env.UNITY_IMAGE_VERSION }}"
          for attempt in 1 2 3; do
            docker pull "$IMAGE" && break
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done

          CONTAINER_ID="$(docker create "$IMAGE")"
          trap 'docker rm "$CONTAINER_ID" >/dev/null 2>&1 || true' EXIT
          mkdir -p .unity-lint-assemblies

          docker cp "$CONTAINER_ID:/opt/unity/Editor/Data/Managed/UnityEngine/." .unity-lint-assemblies/ 2>/dev/null || true
          if docker cp "$CONTAINER_ID:/opt/unity/Editor/Data/Managed/UnityEditor/." .unity-lint-assemblies/ 2>/dev/null; then
            echo "Copied UnityEditor assemblies from Managed/UnityEditor"
          elif docker cp "$CONTAINER_ID:/opt/unity/Editor/Data/Managed/." .unity-lint-assemblies/ 2>/dev/null; then
            echo "Copied Unity managed assemblies from Managed"
          else
            echo "ERROR: Could not locate Unity managed assemblies in $IMAGE"
            exit 1
          fi

          find .unity-lint-assemblies/UnityEngine .unity-lint-assemblies/UnityEditor -maxdepth 1 -name "*.dll" -exec cp {} .unity-lint-assemblies/ \; 2>/dev/null || true

          for assembly in UnityEngine.CoreModule.dll UnityEditor.dll; do
            if [ ! -f ".unity-lint-assemblies/$assembly" ]; then
              echo "ERROR: Missing required Unity lint assembly: $assembly"
              exit 1
            fi
          done

          docker rm "$CONTAINER_ID"
          trap - EXIT

      - name: Lint
        run: UnityManagedAssembliesPath="$PWD/.unity-lint-assemblies" bash build.sh lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    environment: production
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout media
        uses: actions/checkout@v4
        with:
          repository: davidadas/rebellion2-media
          ref: ${{ env.REBELLION2_MEDIA_REVISION }}
          ssh-key: ${{ secrets.REBELLION2_MEDIA_SSH_KEY }}
          persist-credentials: false
          sparse-checkout: Art
          path: .ci/rebellion2-media

      - name: Install media
        run: |
          rsync -a --ignore-existing --exclude=.DS_Store .ci/rebellion2-media/Art/ Assets/Resources/Art/
          rm -rf .ci

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          dockerCpuLimit: 2
          dockerMemoryLimit: 8g
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;assemblyFilters:+GameAssembly"

      - name: Check coverage threshold
        run: |
          python3 - <<'EOF'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          LINE_THRESHOLD   = 62.8
          METHOD_THRESHOLD = 67.4

          summary_path = Path("CodeCoverage/Report/Summary.xml")
          if not summary_path.is_file():
              print("FAIL: CodeCoverage/Report/Summary.xml was not generated")
              sys.exit(1)

          root = ET.parse(summary_path).getroot()
          summary = root.find("Summary")

          covered_lines = int(summary.findtext("Coveredlines", 0))
          total_lines   = int(summary.findtext("Totallines", 0))
          line_pct      = float(summary.findtext("Linecoverage", 0))

          covered_methods = int(summary.findtext("Coveredmethods", 0))
          total_methods   = int(summary.findtext("Totalmethods", 0))
          method_pct      = float(summary.findtext("Methodcoverage", 0))

          print(f"Line coverage:   {line_pct:.1f}% ({covered_lines}/{total_lines})")
          print(f"Method coverage: {method_pct:.1f}% ({covered_methods}/{total_methods})")

          failed = False
          if line_pct < LINE_THRESHOLD:
              print(f"FAIL: line coverage {line_pct:.1f}% is below threshold {LINE_THRESHOLD}%")
              failed = True
          if method_pct < METHOD_THRESHOLD:
              print(f"FAIL: method coverage {method_pct:.1f}% is below threshold {METHOD_THRESHOLD}%")
              failed = True

          if failed:
              sys.exit(1)

          print("OK: all coverage thresholds met")
          EOF
