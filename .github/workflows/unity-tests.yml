name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.4.0f1
          targetPlatform: StandaloneWindows64

      - name: Reset package files
        run: |
          git checkout -- Packages/manifest.json Packages/packages-lock.json 2>/dev/null || true
          sudo rm -rf artifacts || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Install tools
        run: |
          dotnet tool restore
          dotnet tool install -g roslynator.dotnet.cli
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Format check
        run: dotnet csharpier check Assets/

      - name: Lint
        run: bash build.sh lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    environment: production
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.4.0f1
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          dockerCpuLimit: 2
          dockerMemoryLimit: 8g
          enableCodeCoverage: true
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;assemblyFilters:+GameAssembly"

      - name: Check coverage threshold
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, glob, sys

          LINE_THRESHOLD   = 62.8
          METHOD_THRESHOLD = 67.4

          files = glob.glob("artifacts/**/Report/Summary.xml", recursive=True)
          if not files:
              print("No Summary.xml found — skipping threshold check")
              sys.exit(0)

          root = ET.parse(files[0]).getroot()
          summary = root.find("Summary")

          covered_lines = int(summary.findtext("Coveredlines", 0))
          total_lines   = int(summary.findtext("Totallines", 0))
          line_pct      = float(summary.findtext("Linecoverage", 0))

          covered_methods = int(summary.findtext("Coveredmethods", 0))
          total_methods   = int(summary.findtext("Totalmethods", 0))
          method_pct      = float(summary.findtext("Methodcoverage", 0))

          print(f"Line coverage:   {line_pct:.1f}% ({covered_lines}/{total_lines})")
          print(f"Method coverage: {method_pct:.1f}% ({covered_methods}/{total_methods})")

          failed = False
          if line_pct < LINE_THRESHOLD:
              print(f"FAIL: line coverage {line_pct:.1f}% is below threshold {LINE_THRESHOLD}%")
              failed = True
          if method_pct < METHOD_THRESHOLD:
              print(f"FAIL: method coverage {method_pct:.1f}% is below threshold {METHOD_THRESHOLD}%")
              failed = True

          if failed:
              sys.exit(1)

          print("OK: all coverage thresholds met")
          EOF
