name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.4.0f1
          targetPlatform: StandaloneWindows64

      - name: Reset package files
        run: |
          git checkout -- Packages/manifest.json Packages/packages-lock.json 2>/dev/null || true
          sudo rm -rf artifacts || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Install tools
        run: |
          dotnet tool restore
          dotnet tool install -g roslynator.dotnet.cli
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Format check
        run: dotnet csharpier check Assets/

      - name: Lint
        run: bash build.sh lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    environment: production
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.4.0f1
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          dockerCpuLimit: 2
          dockerMemoryLimit: 8g
          enableCodeCoverage: true
          coverageOptions: "generateAdditionalMetrics;assemblyFilters:+GameAssembly"

      - name: Check coverage threshold
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, glob, sys

          THRESHOLD = 50.0

          files = glob.glob("artifacts/**/TestCoverageResults_*.xml", recursive=True)
          if not files:
              print("No coverage XML found — skipping threshold check")
              sys.exit(0)

          total_covered = 0
          total_coverable = 0
          for path in files:
              root = ET.parse(path).getroot()
              summary = root.find("Summary")
              if summary is None:
                  print(f"No top-level Summary found in {path} — skipping file")
                  continue
              total_covered   += int(summary.get("visitedSequencePoints", 0))
              total_coverable += int(summary.get("numSequencePoints", 0))

          if total_coverable == 0:
              print("No coverable lines found — skipping threshold check")
              sys.exit(0)

          pct = total_covered / total_coverable * 100
          print(f"Line coverage: {pct:.1f}% ({total_covered}/{total_coverable})")

          if pct < THRESHOLD:
              print(f"FAIL: coverage {pct:.1f}% is below threshold {THRESHOLD}%")
              sys.exit(1)

          print(f"OK: coverage {pct:.1f}% meets threshold {THRESHOLD}%")
          EOF
